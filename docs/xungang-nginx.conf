# 勋港家具 AI 修图平台 Nginx 生产配置模板
# 域名：https://www.xungang.xin
# 证书包：25179222_www.xungang.xin_nginx.zip
#
# 服务器建议路径：
# - 前端构建目录：/var/www/xungang/frontend/dist
# - 证书文件：/etc/nginx/certs/xungang/www.xungang.xin.pem
# - 私钥文件：/etc/nginx/certs/xungang/www.xungang.xin.key
# - Node 后端：http://127.0.0.1:3001

server {
    listen 80;
    server_name xungang.xin www.xungang.xin;
    return 301 https://www.xungang.xin$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xungang.xin;

    ssl_certificate /etc/nginx/certs/xungang/www.xungang.xin.pem;
    ssl_certificate_key /etc/nginx/certs/xungang/www.xungang.xin.key;

    return 301 https://www.xungang.xin$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.xungang.xin;

    root /var/www/xungang/frontend/dist;
    index index.html;
    client_max_body_size 40m;

    ssl_certificate /etc/nginx/certs/xungang/www.xungang.xin.pem;
    ssl_certificate_key /etc/nginx/certs/xungang/www.xungang.xin.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Real-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /files/ {
        proxy_pass http://127.0.0.1:3001/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Real-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
        default_type application/manifest+json;
        add_header Cache-Control "no-store" always;
    }

    location = /manifest.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
